name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (no publish)
        env:
          # Disable auto-discovery unless secrets are configured
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERT != '' && 'true' || 'false' }}
          # macOS code signing (configure secrets in repo settings)
          CSC_LINK: ${{ secrets.MAC_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*-mac.zip.blockmap
            dist/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts (no publish)
        run: npm run dist:win

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download macOS release assets
        uses: actions/download-artifact@v4
        with:
          name: macos-release-assets
          path: release-assets/macos

      - name: Download Windows release assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/windows

      - name: Create/update draft release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG#v}"

          # Ensure a single draft release exists for this tag.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TITLE" --notes "$TITLE" --draft
          fi

          shopt -s nullglob
          files=(release-assets/macos/* release-assets/windows/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found to upload."
            exit 1
          fi

          gh release upload "$TAG" "${files[@]}" --clobber
        shell: bash
